sonar.projectKey=yosemitecrew_Yosemite-Crew_Desktop
sonar.organization=yosemitecrew

# Source settings
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=./tsconfig.json
sonar.javascript.node.maxspace=4096

# Coverage — lcov generated by "pnpm test:coverage" (jest --coverage).
# Path is relative to projectBaseDir (apps/desktop/).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions (speed up scan, drop generated/vendored/static assets)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.d.ts,resources/**,scripts/**,e2e/**
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**

# Mirror jest's collectCoverageFrom: the composition-root/bootstrap glue
# (main.ts, create-main-window.ts, boot/setup.ts) and the local HTML pages are
# only exercisable in a real Electron runtime and aren't unit-covered, so don't
# penalise their coverage.
sonar.coverage.exclusions=**/*.test.ts,tests/**,e2e/**,scripts/**,src/pages/**,src/main.ts,src/shell/create-main-window.ts,src/boot/setup.ts

# Ignore non-relevant languages
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
