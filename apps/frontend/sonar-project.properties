sonar.projectKey=yosemitecrew_Yosemite-Crew_Frontend
sonar.organization=yosemitecrew

# Source settings
sonar.sources=src
sonar.sourceEncoding=UTF-8
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx,**/__tests__/**

# Coverage — lcov generated by "pnpm test:coverage" (jest --coverage)
# Path is relative to projectBaseDir (apps/frontend/)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions (speed up scan massively)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.d.ts,**/*.stories.tsx,**/*.stories.ts
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx,**/tests/**,**/__tests__/**,**/*.stories.tsx,**/*.stories.ts

# Ignore non-relevant languages
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
