version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automerge-candidate
    # Use a conventional type(scope) the PR-title gate accepts. A bare 'chore'
    # with include:scope yields 'chore(deps): …', and 'deps' is not an allowed
    # scope, so those PRs would fail pr-governance. 'repo' is the catch-all scope.
    commit-message:
      prefix: 'chore(repo)'
    groups:
      typescript-eslint:
        patterns:
          - 'typescript'
          - '@types/*'
          - 'eslint*'
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'jest*'
          - '@testing-library/*'
      build-tooling:
        patterns:
          - 'turbo'
          - 'pnpm'
          - 'prettier'
          - 'husky'
          - 'lint-staged'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:30'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'ci'
    labels:
      - dependencies
      - github-actions
