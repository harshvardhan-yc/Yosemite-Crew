version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automerge-candidate
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      typescript-eslint:
        patterns:
          - 'typescript'
          - '@types/*'
          - 'eslint*'
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'jest*'
          - '@testing-library/*'
      build-tooling:
        patterns:
          - 'turbo'
          - 'pnpm'
          - 'prettier'
          - 'husky'
          - 'lint-staged'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:30'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
