name: Desktop Release

# Builds, code-signs, and publishes the desktop app to a GitHub Release.
# Trigger by pushing a tag like `desktop-v0.1.0-beta.1`:
#   1) bump "version" in apps/desktop/package.json
#   2) git tag desktop-v<version> && git push origin desktop-v<version>
#
# Windows is signed via Azure Artifact Signing (formerly Trusted Signing).
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
#   (the `yc-signing-ci` app registration, holding the
#    "Trusted Signing Certificate Profile Signer" role on the yc-signing account)
#
# macOS is signed with a Developer ID Application cert and notarized via notarytool.
#   CSC_LINK (base64 of the Developer ID .p12), CSC_KEY_PASSWORD,
#   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#
# All values are GitHub Actions secrets (Settings → Secrets and variables → Actions);
# none are committed. Builds succeed unsigned locally when these are unset.

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign (Azure Artifact Signing), and publish
        working-directory: apps/desktop
        run: pnpm run desktop:dist:win -- --publish always
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign (Developer ID), notarize, and publish
        working-directory: apps/desktop
        run: pnpm run desktop:dist:mac -- --publish always
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
