name: sonar-cloud-analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 4 * * *'
  push:
    branches: [main, dev]

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  changes:
    name: Detect workspace changes
    runs-on: ubuntu-latest
    if: github.repository_owner == 'YosemiteCrew'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'packages/types/**'
              - 'packages/fhirtypes/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
            backend:
              - 'apps/backend/**'
              - 'packages/types/**'
              - 'packages/fhirtypes/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
            mobile:
              - 'apps/mobileAppYC/**'
              - 'packages/types/**'
              - 'packages/fhirtypes/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'

  sonarqube:
    if: >
      github.repository_owner == 'YosemiteCrew' &&
      (
        github.event_name == 'schedule' ||
        (matrix.app == 'frontend' && needs.changes.outputs.frontend == 'true') ||
        (matrix.app == 'backend' && needs.changes.outputs.backend == 'true') ||
        (matrix.app == 'mobile' && needs.changes.outputs.mobile == 'true')
      )
    name: SonarQube Analysis - ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: changes

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: frontend
            dir: apps/frontend
            sonar_token: SONAR_TOKEN_FRONTEND
          - app: backend
            dir: apps/backend
            sonar_token: SONAR_TOKEN_API
          - app: mobile
            dir: apps/mobileAppYC
            sonar_token: SONAR_TOKEN_MOBILE

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ${{ env.STORE_PATH }}
            ~/.sonar/cache
          key: cache-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client (backend)
        if: matrix.app == 'backend'
        working-directory: ${{ matrix.dir }}
        run: pnpm prisma generate

      - name: Run tests
        working-directory: ${{ matrix.dir }}
        run: pnpm test -- --coverage

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ matrix.dir }}
        env:
          SONAR_TOKEN: ${{ secrets[matrix.sonar_token] }}
