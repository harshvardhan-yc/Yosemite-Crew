name: sonar-cloud-analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 4 * * *'
  push:
    branches: [main, dev]

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  changes:
    name: Detect workspace changes
    runs-on: ubuntu-latest
    if: github.repository_owner == 'YosemiteCrew' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      desktop: ${{ steps.filter.outputs.desktop }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'packages/types/**'
              - 'packages/fhir/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
            backend:
              - 'apps/backend/**'
              - 'packages/types/**'
              - 'packages/fhir/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
            mobile:
              - 'apps/mobileAppYC/**'
              - 'packages/types/**'
              - 'packages/fhir/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
            desktop:
              - 'apps/desktop/**'
              - 'packages/types/**'
              - 'packages/fhir/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
      - name: Build matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          apps=()
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            apps+=(frontend backend mobile)
            [[ -d apps/desktop ]] && apps+=(desktop)
          else
            [[ "${{ steps.filter.outputs.frontend }}" == "true" ]] && apps+=(frontend)
            [[ "${{ steps.filter.outputs.backend }}" == "true" ]] && apps+=(backend)
            [[ "${{ steps.filter.outputs.mobile }}" == "true" ]] && apps+=(mobile)
            [[ "${{ steps.filter.outputs.desktop }}" == "true" ]] && apps+=(desktop)
          fi

          if [[ ${#apps[@]} -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json='{"include":['
          first=1
          for app in "${apps[@]}"; do
            case "$app" in
              frontend)
                dir="apps/frontend"
                token="SONAR_TOKEN_FRONTEND"
                ;;
              backend)
                dir="apps/backend"
                token="SONAR_TOKEN_API"
                ;;
              mobile)
                dir="apps/mobileAppYC"
                token="SONAR_TOKEN_MOBILE"
                ;;
              desktop)
                dir="apps/desktop"
                token="SONAR_TOKEN_DESKTOP"
                ;;
              *)
                echo "Unknown app: $app" >&2
                exit 1
                ;;
            esac

            if [[ $first -eq 0 ]]; then
              json+=','
            else
              first=0
            fi
            json+="{\"app\":\"$app\",\"dir\":\"$dir\",\"sonar_token\":\"$token\"}"
          done
          json+=']}'

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "matrix=$json" >> "$GITHUB_OUTPUT"

  sonarqube:
    if: >
      github.repository_owner == 'YosemiteCrew' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
      (
        github.event_name == 'schedule' ||
        needs.changes.outputs.has_changes == 'true'
      )
    name: SonarQube Analysis - ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: changes

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      # Per-app Jest transform cache. Keyed without github.sha so it actually
      # restores across commits (the previous backend-only key never hit on the
      # frontend leg, so every frontend Sonar run recompiled from cold).
      - name: Per-app Jest transform cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.dir }}/.jest-cache
          key: jest-${{ matrix.app }}-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            jest-${{ matrix.app }}-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: |
            ${{ env.STORE_PATH }}
            ~/.sonar/cache
          key: cache-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client (backend)
        if: matrix.app == 'backend'
        working-directory: ${{ matrix.dir }}
        run: pnpm prisma:generate

      - name: Run tests with coverage
        working-directory: ${{ matrix.dir }}
        run: pnpm run test --coverage --ci --maxWorkers=4 --cacheDirectory=.jest-cache

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        with:
          projectBaseDir: ${{ matrix.dir }}
        env:
          SONAR_TOKEN: ${{ secrets[matrix.sonar_token] }}
