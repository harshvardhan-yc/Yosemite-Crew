name: Secret Scan

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks (OSS CLI)
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh \
            | sh -s -- -b /usr/local/bin v8.24.2

      - name: Run Gitleaks
        run: gitleaks git --redact --verbose --exit-code 1
