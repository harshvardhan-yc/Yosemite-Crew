name: Frontend Accessibility (axe)

on:
  pull_request:
    paths:
      - 'apps/frontend/src/**'
      - 'apps/frontend/jest.setup.ts'
      - 'apps/frontend/jest.config.ts'
      - 'apps/frontend/package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/frontend-a11y.yml'
  push:
    branches: [main, dev]
    paths:
      - 'apps/frontend/src/**'
      - 'apps/frontend/jest.setup.ts'
      - 'apps/frontend/jest.config.ts'
      - 'apps/frontend/package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: frontend-a11y-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  axe-unit:
    name: jest-axe accessibility assertions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      # jest-axe asserts zero WCAG 2.1 AA violations inside the component tests, so
      # any new violation fails this step directly — no separate gate step needed.
      - name: Run jest-axe accessibility tests
        run: pnpm --filter frontend run test:a11y
