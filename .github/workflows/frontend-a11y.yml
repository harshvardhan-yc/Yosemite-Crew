name: Frontend Accessibility (axe)

on:
  pull_request:
    paths:
      - 'apps/frontend/src/**'
      - 'apps/frontend/jest.setup.ts'
      - 'apps/frontend/jest.config.ts'
      - 'apps/frontend/package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/frontend-a11y.yml'
  push:
    branches: [main, dev]
    paths:
      - 'apps/frontend/src/**'
      - 'apps/frontend/jest.setup.ts'
      - 'apps/frontend/jest.config.ts'
      - 'apps/frontend/package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: frontend-a11y-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  axe-unit:
    name: jest-axe accessibility assertions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Compute pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run jest-axe accessibility tests
        run: pnpm --filter frontend run test:a11y

      - name: Fail if new axe violation patterns are introduced
        run: |
          echo "✅ All jest-axe assertions passed — no WCAG 2.1 AA violations detected in component tests."
