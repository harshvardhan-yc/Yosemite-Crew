name: Frontend Quality

on:
  pull_request:
    paths:
      - 'apps/frontend/**'
      - 'packages/types/**'
      - 'packages/fhirtypes/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/dependency-review.yml'
      - '.github/workflows/frontend-quality.yml'
  push:
    branches: [main, dev]
    paths:
      - 'apps/frontend/**'
      - 'packages/types/**'
      - 'packages/fhirtypes/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/dependency-review.yml'
  workflow_dispatch:

concurrency:
  group: frontend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-headers:
    name: Frontend security header regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend security headers
        run: pnpm --filter frontend run test -- --testPathPattern='config/securityHeaders.test.ts'

  type-check-and-test:
    name: Frontend type-check and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Jest transform cache
        uses: actions/cache@v4
        with:
          path: apps/frontend/.jest-cache
          key: jest-${{ runner.os }}-${{ hashFiles('apps/frontend/jest.config.ts', 'apps/frontend/package.json') }}-${{ github.sha }}
          restore-keys: |
            jest-${{ runner.os }}-${{ hashFiles('apps/frontend/jest.config.ts', 'apps/frontend/package.json') }}-
            jest-${{ runner.os }}-

      - name: Build shared packages
        run: pnpm run build --filter "@yosemite-crew/types" --filter "@yosemite-crew/fhirtypes"

      - name: Type-check
        run: pnpm --filter frontend run type-check

      - name: Lint
        run: pnpm --filter frontend run lint

      - name: Unit tests with coverage
        run: pnpm --filter frontend run test -- --ci --maxWorkers=4 --cacheDirectory=.jest-cache --coverage --coverageThreshold='{"global":{"statements":80,"branches":70,"functions":78,"lines":80}}'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/frontend/coverage/

  react-doctor:
    name: React Doctor health check (score ≥ 70)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run React Doctor and enforce minimum score
        run: |
          OUTPUT=$(npx react-doctor@latest apps/frontend --no-interactive 2>&1 || true)
          echo "$OUTPUT"
          SCORE=$(echo "$OUTPUT" | grep -oP '(?<=│ • • │  )\d+(?= / 100)' || echo "")
          if [ -z "$SCORE" ]; then
            SCORE=$(echo "$OUTPUT" | grep -oP '\d+(?= / 100)' | head -1 || echo "0")
          fi
          echo "React Doctor score: $SCORE"
          if [ "$SCORE" -lt 70 ]; then
            echo "❌ React Doctor score $SCORE is below the minimum of 70"
            exit 1
          fi
          echo "✅ React Doctor score $SCORE meets the minimum of 70"

  build-quality:
    name: Frontend build, bundle budgets, Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm run build --filter "@yosemite-crew/types" --filter "@yosemite-crew/fhirtypes"

      - name: Build frontend
        run: pnpm --filter frontend run build

      - name: Check bundle budgets
        working-directory: apps/frontend
        run: pnpm run check:bundle-budgets

      - name: Export route build report
        working-directory: apps/frontend
        run: pnpm run report:build-routes

      - name: Upload route build report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-route-report
          path: |
            apps/frontend/artifacts/build-route-report.json
            apps/frontend/artifacts/build-route-report.md

      - name: Start frontend server
        run: |
          nohup pnpm --filter frontend exec next start -H 127.0.0.1 -p 3001 > /tmp/frontend-lighthouse.log 2>&1 &
          echo $! > /tmp/frontend-lighthouse.pid

      - name: Wait for frontend server
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:3001/pms > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          cat /tmp/frontend-lighthouse.log
          exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: apps/frontend/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Stop frontend server
        if: always()
        run: |
          if [ -f /tmp/frontend-lighthouse.pid ]; then
            kill "$(cat /tmp/frontend-lighthouse.pid)" || true
          fi
