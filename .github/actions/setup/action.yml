name: Setup pnpm + Node
description: >
  Shared toolchain setup for all workspaces: pnpm, Node, the pnpm content-addressable
  store cache, and (optionally) a frozen install. Centralises what was previously copy
  pasted into every job so caching stays consistent across workflows.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: '20'
  install:
    description: Run `pnpm install --frozen-lockfile` as part of setup.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      with:
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Resolve pnpm store path
      id: store
      shell: bash
      run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ steps.store.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-${{ inputs.node-version }}-

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
